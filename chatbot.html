<!-- ══════════════════════════════════════
     CHATBOT SMART EDUCATION
     Inclure ce bloc à la fin de chaque page HTML
     ══════════════════════════════════════ -->

<!-- Bouton flottant -->
<button id="chatToggle" class="chat-toggle" title="Assistant pédagogique">
    <span>💬</span>
</button>

<!-- Fenêtre du chat -->
<div id="chatWindow" class="chat-window">
    <div class="chat-header">
        <span>🎓 Assistant Smart Education</span>
        <button id="chatClose" class="chat-close">&times;</button>
    </div>
    
    <div id="chatMessages" class="chat-messages">
        <div class="msg-bot">
            <div class="msg-avatar">🤖</div>
            <div class="msg-bubble">
                Bonjour ! Je suis ton assistant pédagogique. Pose-moi tes questions sur les maths, le français ou les sciences ! 📚
            </div>
        </div>
    </div>
    
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Écris ta question ici..." autocomplete="off">
        <button id="chatSend" class="btn btn-vert">
            <span>➤</span>
        </button
